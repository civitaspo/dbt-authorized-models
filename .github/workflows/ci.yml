name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    defaults:
      run:
        working-directory: integration_tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: integration_tests/uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install dbt packages
        run: uv run dbt deps

      - name: Run macro tests
        run: uv run dbt run-operation test_all_macros --profiles-dir .

      - name: Compile integration project
        run: uv run dbt compile --profiles-dir .

  fusion-compatibility:
    name: dbt Fusion compatibility
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: integration_tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dbt Fusion
        run: |
          mkdir -p "$RUNNER_TEMP/dbt-fusion-bin"
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh \
            | sh -s -- --to "$RUNNER_TEMP/dbt-fusion-bin" --update
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" --version

      - name: Install dbt packages
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" deps --profiles-dir .

      - name: Parse integration project
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" parse --profiles-dir .

      - name: Run macro tests
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" run-operation test_all_macros --profiles-dir .

      - name: Compile integration project
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" compile --profiles-dir .
