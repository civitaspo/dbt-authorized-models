name: Securefix Server

on:
  label:
    types:
      - created

permissions: {}

concurrency:
  group: securefix-server-${{ github.event.label.name }}
  cancel-in-progress: false

jobs:
  fix:
    if: startsWith(github.event.label.name, 'securefix-')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    timeout-minutes: 10
    env:
      SECUREFIX_SERVER_APP_ID: ${{ vars.SECUREFIX_SERVER_APP_ID }}

    steps:
      - name: Run Securefix server
        if: env.SECUREFIX_SERVER_APP_ID != ''
        uses: csm-actions/securefix-action@4d885e1bcb71f4f110215c833002ce9fa0ee0fa6 # v0.6.0
        with:
          action: server
          allow_workflow_fix: true
          app_id: ${{ env.SECUREFIX_SERVER_APP_ID }}
          app_private_key: ${{ secrets.SECUREFIX_SERVER_PRIVATE_KEY }}
          commit_message: "ci: apply workflow security fixes"
          workflow_name: Lint
