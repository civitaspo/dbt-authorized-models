name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: "2026.5.15"
          install_args: "--locked"
          cache: false

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install unit test packages
        run: uv run dbt deps --project-dir unit_tests --profiles-dir unit_tests

      - name: Run unit tests
        run: uv run dbt run-operation run_unit_tests --project-dir unit_tests --profiles-dir unit_tests

      - name: Install integration test packages
        run: uv run dbt deps --project-dir integration_tests --profiles-dir integration_tests

      - name: Run authorization failure tests
        run: uv run python integration_tests/run_authorization_failure_tests.py

      - name: Assert dbt_project.yml source metadata
        run: uv run python integration_tests/assert_project_source_meta.py

      - name: Compile integration project
        run: uv run dbt compile --project-dir integration_tests --profiles-dir integration_tests

      - name: Install dbt Fusion
        run: |
          mkdir -p "$RUNNER_TEMP/dbt-fusion-bin"
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh \
            | sh -s -- --to "$RUNNER_TEMP/dbt-fusion-bin" --update
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" --version

      - name: Install unit test packages with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" deps --project-dir unit_tests --profiles-dir unit_tests

      - name: Run unit tests with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" run-operation run_unit_tests --project-dir unit_tests --profiles-dir unit_tests

      - name: Install integration test packages with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" deps --project-dir integration_tests --profiles-dir integration_tests

      - name: Parse integration project with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" parse --project-dir integration_tests --profiles-dir integration_tests

      - name: Run authorization failure tests with Fusion
        run: |
          uv run python integration_tests/run_authorization_failure_tests.py --dbt-executable "$RUNNER_TEMP/dbt-fusion-bin/dbt"

      - name: Assert dbt_project.yml source metadata with Fusion
        run: |
          uv run python integration_tests/assert_project_source_meta.py --dbt-executable "$RUNNER_TEMP/dbt-fusion-bin/dbt"

      - name: Compile integration project with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" compile --project-dir integration_tests --profiles-dir integration_tests

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
