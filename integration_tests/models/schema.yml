version: 2

models:
  - name: stg_customers
    description: Customer records used by downstream models.
    config:
      meta:
        authorize:
          - resource_type: "model"
            database: ".*"
            schema: ".*marts"
          - resource_type: "model"
            database: ".*"
            schema: ".*"
            identifier: ".*"
            tags: "intermediate"

  - name: customers
    description: Public customer dimension.
    config:
      meta:
        authorize:
          - "*"

  - name: customer_pii
    description: Restricted customer PII.
    config:
      meta:
        authorize:
          - resource_type: "model"
            database: ".*"
            schema: ".*"
            identifier: ".*"
            tags: "pii_approved"
          - resource_type: "model"
            database: ".*"
            schema: ".*"
            identifier: ".*"
            tags: "admin"

  - name: customer_pii_report
    description: Authorized report that reads restricted customer PII.
    config:
      meta:
        authorize:
          - "*"

  - name: source_customer_report
    description: Authorized report that reads a protected source.
    config:
      meta:
        authorize:
          - "*"

  - name: source_project_meta_source_report
    description: Authorized report that reads a source with authorization configured at source level in dbt_project.yml.
    config:
      meta:
        authorize:
          - "*"

  - name: source_project_meta_table_report
    description: Authorized report that reads a source table with authorization configured at table level in dbt_project.yml.
    config:
      meta:
        authorize:
          - "*"

sources:
  - name: raw
    description: Protected raw data sources.
    schema: raw
    tables:
      - name: customers
        identifier: raw_customers
        description: Raw customer records.
        config:
          meta:
            authorize:
              - resource_type: "model"
                database: ".*"
                schema: ".*marts"
                identifier: "source_customer_report"

  - name: missing_authorize
    description: Source fixtures without authorization metadata.
    schema: raw
    tables:
      - name: customers
        identifier: missing_authorize_customers
        description: Raw customer records without meta.authorize.

  - name: empty_authorize
    description: Source fixtures with empty authorization rules.
    schema: raw
    tables:
      - name: customers
        identifier: empty_authorize_customers
        description: Raw customer records with empty meta.authorize.
        config:
          meta:
            authorize: []

  - name: project_meta_source
    description: Source fixture whose authorization metadata is configured at source level in dbt_project.yml.
    schema: raw
    tables:
      - name: customers
        identifier: project_meta_source_customers
        description: Raw customer records authorized through source-level dbt_project.yml +meta.

  - name: project_meta_table
    description: Source fixture whose authorization metadata is configured at table level in dbt_project.yml.
    schema: raw
    tables:
      - name: customers
        identifier: project_meta_table_customers
        description: Raw customer records authorized through table-level dbt_project.yml +meta.
