[tools]
"aqua:suzuki-shunsuke/disable-checkout-persist-credentials" = "1.0.0"
"aqua:suzuki-shunsuke/ghalint" = "1.5.6"
"aqua:suzuki-shunsuke/pinact" = "4.0.0"

[tasks."ci:workflows"]
description = "Check GitHub Actions workflow security settings"
run = [
  "ghalint run",
  "pinact run --check --verify-comment",
  "disable-checkout-persist-credentials",
  "git diff --exit-code -- .github/workflows",
]
